<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPro</title>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="FitGuide.css">
</head>
<body>

<header class="main-header">
    <div class="header-content">
        <div class="logo">
            <h1><i class="fas fa-dumbbell"></i>FitPro</h1>
            <p>Программы тренировок + Калькулятор КБЖУ</p>
        </div>
        <div class="program-selector">
            <label><i class="fas fa-chart-line"></i> Уровень:</label>
            <select id="levelSelect">
                <option value="beginner">🌱 Для начинающих</option>
                <option value="intermediate">⚡ Для средних</option>
                <option value="advanced">💪 Для опытных</option>
            </select>
            <label><i class="fas fa-map-marker-alt"></i> Место занятий:</label>
            <select id="placeSelect">
                <option value="gym">🏋️ Тренажерный зал</option>
                <option value="home">🏠 Дом</option>
                <option value="street">🌳 Улица / Стадион</option>
            </select>
        </div>
    </div>
</header>

<div class="main-container">
    <div class="training-section">
        <div class="days-tabs" id="daysTabs"></div>
        <div class="program-card">
            <div class="program-header">
                <h2 id="programTitle">🏋️ Программа тренировки</h2>
                <p id="programSubtitle">Выберите день недели и место занятий</p>
            </div>
            <div class="exercises-grid" id="exercisesList"></div>
        </div>
    </div>

    <div class="right-sidebar">
        <div class="tips-card">
            <div class="tips-header">
                <h3><i class="fas fa-lightbulb"></i> Советы дня</h3>
                <i class="fas fa-comment-dots"></i>
            </div>
            <div class="tip-content" id="tipContent"></div>
            <div class="slider-controls">
                <button class="slider-btn" id="prevTip"><i class="fas fa-chevron-left"></i> Назад</button>
                <button class="slider-btn" id="nextTip">Вперёд <i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="slider-dots" id="sliderDots"></div>
        </div>

        <div class="nutrition-card">
            <h2><i class="fas fa-calculator"></i> Калькулятор КБЖУ</h2>
            <div class="calc-form">
                <div class="form-row">
                    <div class="form-group"><label>Пол</label><select id="gender"><option value="male">Мужчина</option><option value="female">Женщина</option></select></div>
                    <div class="form-group"><label>Рост (см)</label><input type="number" id="height" placeholder="170" value="170"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Вес (кг)</label><input type="number" id="weight" placeholder="70" value="70"></div>
                    <div class="form-group"><label>Возраст (лет)</label><input type="number" id="age" placeholder="25" value="25"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Цель</label><select id="goalKBJU"><option value="lose">🔥 Похудение</option><option value="maintain">⚖️ Поддержание</option><option value="gain">💪 Набор массы</option></select></div>
                    <div class="form-group"><label>Активность</label><select id="activity"><option value="1.2">🛋️ Минимальная</option><option value="1.375">🚶 Легкая (1-2 тренировки)</option><option value="1.55">🏃 Средняя (3-5)</option><option value="1.725">💪 Высокая (6-7)</option><option value="1.9">⚡ Очень высокая</option></select></div>
                </div>
                <button class="calc-btn" id="calcKBJU"><i class="fas fa-chart-simple"></i> Рассчитать КБЖУ</button>
            </div>
            <div id="kbjuResult" class="kbju-result">
                <div style="font-weight:bold;">📊 Ваша норма</div>
                <div class="result-stats" id="resultStats"><div class="stat">—</div></div>
                <div class="result-tip" id="resultTip">Заполните данные и нажмите "Рассчитать"</div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <p><i class="fas fa-dumbbell"></i> FitPro — Техника выполнения: нажмите на кнопку "Техника" под каждым упражнением</p>

                ],
                friday: [
                    { name: "Бег 1 км + берпи суперсет", muscle: "Кардио", reps: "3 подхода", desc: "Функциональное", technique: "Максимальная пульс." }
                ]
            }
        };

        function getMuscleIcon(muscleName) {
            const icons = { "Грудные": "💪", "Спина": "🦾", "Ноги": "🦵", "Бицепс": "💪", "Трицепс": "💪", "Квадрицепс": "🦵", "Бицепс бедра": "🦵", "Икроножные": "🦵", "Дельты": "🏋️", "Плечи": "🏋️", "Задняя дельта": "🏋️", "Full Body": "🔥" };
            return icons[muscleName] || "🏋️";
        }

        let currentLevel = "beginner", currentPlace = "gym", currentDayIndex = 0;

        function getCurrentExercises() {
            if (currentLevel === "beginner") {
                return beginnerBase[currentPlace] || beginnerBase.gym;
            } else if (currentLevel === "intermediate") {
                let dayKey = currentDayIndex === 0 ? "monday" : (currentDayIndex === 1 ? "wednesday" : "friday");
                return intermediateBase[currentPlace]?.[dayKey] || intermediateBase.gym[dayKey] || intermediateBase.gym.monday;
            } else {
                let dayKey = currentDayIndex === 0 ? "monday" : (currentDayIndex === 1 ? "wednesday" : "friday");
                return advancedBase[currentPlace]?.[dayKey] || advancedBase.gym[dayKey] || advancedBase.gym.monday;
            }
        }

        function getTitleByDay() {
            const placeNames = { gym: "Зал 🏋️", home: "Дом 🏠", street: "Улица 🌳" };
            if (currentLevel === "beginner") {
                return [`Понедельник (Full Body) - ${placeNames[currentPlace]}`, `Среда (Full Body) - ${placeNames[currentPlace]}`, `Пятница (Full Body) - ${placeNames[currentPlace]}`][currentDayIndex];
            } else if (currentLevel === "intermediate") {
                return [`Понедельник (Верх тела) - ${placeNames[currentPlace]}`, `Среда (Низ + Плечи) - ${placeNames[currentPlace]}`, `Пятница (Full Body) - ${placeNames[currentPlace]}`][currentDayIndex];
            } else {
                return [`Понедельник (Тяни) - ${placeNames[currentPlace]}`, `Среда (Толкай) - ${placeNames[currentPlace]}`, `Пятница (Ноги) - ${placeNames[currentPlace]}`][currentDayIndex];
            }
        }

        function renderDayButtons() {
            let btns = '';
            const dayNames = ["ПН", "СР", "ПТ"];
            for (let i = 0; i < 3; i++) {
                btns += `<button class="day-btn ${i === currentDayIndex ? 'active' : ''}" data-day="${i}"><i class="fas fa-calendar-day"></i> ${dayNames[i]}</button>`;
            }
            $('#daysTabs').html(btns);
            $('.day-btn').click(function() { currentDayIndex = parseInt($(this).data('day')); renderDayButtons(); renderProgram(); });
        }

        function renderProgram() {
            const exercises = getCurrentExercises();
            const title = getTitleByDay();
            const levelNames = { beginner: "Начинающий", intermediate: "Средний", advanced: "Опытный" };
            const placeNames = { gym: "Тренажерный зал", home: "Дом", street: "Улица/Стадион" };
            $('#programTitle').html(`🏋️ ${title}`);
            $('#programSubtitle').html(`Уровень: ${levelNames[currentLevel]} | Место: ${placeNames[currentPlace]}`);

            let html = '';
            exercises.forEach((ex, idx) => {
                html += `
                    <div class="exercise-card">
                        <div class="exercise-main">
                            <div class="muscle-visual">
                                <div class="muscle-img">${getMuscleIcon(ex.muscle)}</div>
                                <span class="muscle-name">${ex.muscle}</span>
                            </div>
                            <div class="exercise-details">
                                <h3>${ex.name}</h3>
                                <div class="exercise-reps"><i class="fas fa-repeat"></i> ${ex.reps}</div>
                                <p class="exercise-desc">${ex.desc}</p>
                                <button class="technique-btn" data-techidx="${idx}"><i class="fas fa-video"></i> Техника выполнения</button>
                                <div class="technique-modal" id="techModal-${idx}">
                                    <i class="fas fa-check-circle" style="color:#ff914d"></i> 
                                    <strong>📖 Техника:</strong> ${ex.technique}<br><br>
                                    <!-- <img src="images/${ex.name.toLowerCase().replace(/ /g, '_')}.jpg" style="width:100%; border-radius:16px;"> -->
                                    <img src="${ex.image}" alt="${ex.name}" style="max-width:100%; max-height:150px;">
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            $('#exercisesList').html(html);
            $('.technique-btn').click(function() {
                let i = $(this).data('techidx');
                $(`#techModal-${i}`).toggleClass('show');
            });
        }

        $('#levelSelect, #placeSelect').on('change', function() {
            currentLevel = $('#levelSelect').val();
            currentPlace = $('#placeSelect').val();
            currentDayIndex = 0;
            renderDayButtons();
            renderProgram();
        });
        renderDayButtons();
        renderProgram();

        function calculateKBJU() {
            const gender = $('#gender').val();
            let height = parseFloat($('#height').val());
            let weight = parseFloat($('#weight').val());
            let age = parseFloat($('#age').val());
            let activity = parseFloat($('#activity').val());
            let goal = $('#goalKBJU').val();
            if (isNaN(height) || isNaN(weight) || isNaN(age)) return;
            let bmr = (gender === 'male') ? (10 * weight + 6.25 * height - 5 * age + 5) : (10 * weight + 6.25 * height - 5 * age - 161);
            let tdee = bmr * activity;
            let kcal = (goal === 'lose') ? tdee * 0.85 : (goal === 'gain') ? tdee * 1.1 : tdee;
            let protein = Math.round(weight * 1.8);
            let fats = Math.round((kcal * 0.25) / 9);
            let carbs = Math.round((kcal - (protein * 4) - (fats * 9)) / 4);
            if (carbs < 100) carbs = 100;
            $('#resultStats').html(`
                <div class="stat"><span class="stat-value">${Math.round(kcal)}</span><div class="stat-label">Ккал</div></div>
                <div class="stat"><span class="stat-value">${protein}</span><div class="stat-label">Белки</div></div>
                <div class="stat"><span class="stat-value">${fats}</span><div class="stat-label">Жиры</div></div>
                <div class="stat"><span class="stat-value">${carbs}</span><div class="stat-label">Углеводы</div></div>
            `);
            $('#resultTip').html(`🎯 Цель: ${goal === 'lose' ? 'Похудение' : goal === 'gain' ? 'Набор массы' : 'Поддержание'} | BMR: ${Math.round(bmr)} ккал`);
        }
        $('#calcKBJU').click(calculateKBJU);
        calculateKBJU();

        const tipsList = [
            { text: "Пей воду за 20 минут до еды — ускоряет метаболизм.", icon: "fas fa-tint" },
            { text: "Сон 7-8 часов — лучшее восстановление мышц.", icon: "fas fa-bed" },
            { text: "Всегда разминайся 5-10 минут перед тренировкой.", icon: "fas fa-heartbeat" },
            { text: "Белок в каждый приём пищи помогает росту мышц.", icon: "fas fa-egg" },
            { text: "Записывай прогресс — это мотивирует.", icon: "fas fa-chart-line" },
            { text: "Растяжка после тренировки снижает крепатуру.", icon: "fas fa-hand-peace" }
        ];
        let tipIdx = 0;
        function renderTip() {
            $('#tipContent').html(`<div class="tip-icon"><i class="${tipsList[tipIdx].icon}"></i></div><div class="tip-text">“${tipsList[tipIdx].text}”</div>`);
            $('.dot').removeClass('active');
            $(`.dot[data-idx="${tipIdx}"]`).addClass('active');
        }
        function initTips() {
            let dots = '';
            tipsList.forEach((_, i) => { dots += `<div class="dot ${i === 0 ? 'active' : ''}" data-idx="${i}"></div>`; });
            $('#sliderDots').html(dots);
            renderTip();
            $('#prevTip').click(() => { tipIdx = (tipIdx - 1 + tipsList.length) % tipsList.length; renderTip(); });
            $('#nextTip').click(() => { tipIdx = (tipIdx + 1) % tipsList.length; renderTip(); });
            $(document).on('click', '.dot', function() { tipIdx = $(this).data('idx'); renderTip(); });
        }
        initTips();
    });
</script>
</body>
</html>
